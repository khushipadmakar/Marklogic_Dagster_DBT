name: ETL CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:   # ✅ IMPORTANT FIX
      POSTGRES_USER: os.getenv("POSTGRES_USER")
      POSTGRES_PASSWORD: os.getenv("POSTGRES_PASSWORD")
      POSTGRES_DB: os.getenv("POSTGRES_DB")

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "Khushboo@2004"
          POSTGRES_DB: "order_quality_analytics_db"
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dbt-postgres

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          order_analytics:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                user: "postgres"
                password: $POSTGRES_PASSWORD
                port: 5432
                dbname: $POSTGRES_DB
                schema: public
                threads: 1
          EOF

      - name: Run tests
        run: pytest -v

      - name: Run dbt
        working-directory: order_analytics
        run: |
          dbt debug
          dbt deps || true
          dbt run